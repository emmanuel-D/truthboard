name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt violations:"
            gofmt -d $out
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck the shipped shell
        run: |
          shellcheck install.sh .github/scripts/brew-formula.sh \
            docker/entrypoint.sh .github/scripts/docker-smoke.sh

  docker:
    # The Dockerfile and its entrypoint were written without a Docker engine
    # on the author's machine; this job is where "the image works" stops
    # being an assumption. Runners ship Docker, so no setup is needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build and exercise the image
        run: .github/scripts/docker-smoke.sh truthboard:ci
