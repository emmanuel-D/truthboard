<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Truthboard</title>
<style>
  :root {
    color-scheme: light;
    --page:      #f9f9f7;
    --card:      #fcfcfb;
    --ink:       #0b0b0b;
    --ink-2:     #52514e;
    --muted:     #898781;
    --hairline:  #e1e0d9;
    --ring:      rgba(11,11,11,0.10);
    /* status system: fixed status palette + two categorical slots */
    --regressed: #d03b3b;  /* critical */
    --stalled:   #b26a00;  /* warning, deepened for light-surface text */
    --done:      #0ca30c;  /* good */
    --in-review: #4a3aa7;  /* categorical violet */
    --in-progress:#2a78d6; /* categorical blue */
    --planned:   #898781;  /* muted ink — not yet real */
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:      #0d0d0d;
      --card:      #1a1a19;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --hairline:  #2c2c2a;
      --ring:      rgba(255,255,255,0.10);
      --regressed: #d03b3b;
      --stalled:   #fab219;
      --done:      #0ca30c;
      --in-review: #9085e9;
      --in-progress:#3987e5;
      --planned:   #898781;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 1.4rem clamp(1rem, 4vw, 2.5rem) 0;
    max-width: 78rem; margin: 0 auto;
  }
  a { color: inherit; }

  /* ---------- header ---------- */
  header { display: flex; align-items: baseline; gap: .8rem; flex-wrap: wrap; }
  header h1 { font-size: 1.25rem; letter-spacing: -.01em; }
  .live { display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem; color: var(--ink-2); }
  .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--done); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .25; } }
  .meta { width: 100%; color: var(--muted); font-size: .8rem; margin-top: .1rem; }
  .banner { color: var(--muted); font-size: .8rem; margin: .35rem 0 1.1rem; }
  .banner b { color: var(--ink-2); font-weight: 600; }
  .warn {
    border: 1px solid var(--stalled); border-radius: 8px; background: var(--card);
    padding: .5rem .8rem; margin-bottom: 1rem; font-size: .84rem; color: var(--ink-2);
  }

  /* ---------- stat tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr)); gap: .7rem; margin-bottom: 1.1rem; }
  .tile {
    background: var(--card); border: 1px solid var(--ring); border-radius: 10px;
    padding: .7rem .9rem .6rem;
  }
  .tile .num { font-size: 1.7rem; font-weight: 650; line-height: 1.1; }
  .tile .lbl { font-size: .74rem; color: var(--muted); display: flex; align-items: center; gap: .35rem; margin-top: .1rem; }
  .tile .lbl .mark { width: 8px; height: 8px; border-radius: 3px; display: inline-block; }

  /* ---------- kanban ---------- */
  .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(13.5rem, 1fr);
           gap: .8rem; overflow-x: auto; padding-bottom: .4rem; margin-bottom: 1.2rem; }
  .col { min-width: 0; }
  .col h3 {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .07em;
    display: flex; align-items: center; gap: .4rem; margin: 0 .1rem .5rem;
  }
  .col h3 .count { color: var(--muted); font-weight: 500; }
  .card {
    background: var(--card); border: 1px solid var(--ring); border-left-width: 3px;
    border-radius: 10px; padding: .65rem .8rem; margin-bottom: .6rem;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,.08); }
  .card .title { font-weight: 600; font-size: .88rem; line-height: 1.35; }
  .card .sub { margin-top: .3rem; font-size: .75rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: .3rem .6rem; align-items: baseline; }
  .tag { border: 1px solid var(--hairline); border-radius: 999px; padding: 0 .5rem; font-size: .68rem; color: var(--ink-2); }
  .tag.pri { font-weight: 700; }
  .card .sub code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .72rem; }
  .card .why { margin-top: .35rem; font-size: .78rem; color: var(--ink-2); }
  .card .owner { margin-top: .4rem; font-size: .72rem; color: var(--muted); }
  .empty-col { border: 1px dashed var(--hairline); border-radius: 10px; padding: .8rem; color: var(--muted); font-size: .78rem; }

  /* ---------- sections ---------- */
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(20rem, 1fr)); gap: .8rem; margin-bottom: 1.2rem; }
  section.panel { background: var(--card); border: 1px solid var(--ring); border-radius: 10px; padding: .9rem 1.1rem; }
  section.panel h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: .6rem; }
  .finding { display: flex; gap: .5rem; padding: .3rem 0; font-size: .84rem; align-items: baseline; }
  .finding .ico { flex: 0 0 1.1rem; text-align: center; }
  .finding .what { color: var(--ink-2); }
  .finding .what b { color: var(--ink); font-weight: 600; }
  .finding code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .78rem; }
  .clean { color: var(--done); font-size: .84rem; }
  .clean::before { content: "✓ "; }
  .more { color: var(--muted); font-size: .78rem; padding: .2rem 0 0 1.6rem; }

  /* branches + digest */
  .rows { font-size: .84rem; }
  .rows .r { display: flex; gap: .6rem; padding: .3rem 0; border-top: 1px solid var(--hairline); align-items: baseline; }
  .rows .r:first-child { border-top: none; }
  .status { font-size: .72rem; font-weight: 650; white-space: nowrap; flex: 0 0 7.2rem; }
  .rows code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .78rem; }
  .rows .ev { color: var(--muted); font-size: .78rem; }
  .digest .r { gap: .8rem; }
  .digest time { color: var(--muted); font-variant-numeric: tabular-nums; flex: 0 0 5.6rem; font-size: .78rem; }

  footer { text-align: center; color: var(--muted); font-size: .74rem; padding: .6rem 0 1.6rem; }
</style>
</head>
<body>
<header>
  <h1>Truthboard</h1>
  <span class="live"><span class="dot"></span><span id="updated">connecting…</span></span>
  <div class="meta" id="meta"></div>
</header>
<p class="banner"><b>Derived from git, never typed.</b> Every status on this page is computed from repository facts — there is nothing here to edit.</p>
<div id="app"></div>
<footer>truthboard · refreshes automatically · read-only by construction</footer>

<script>
"use strict";
const STATUS = {
  "regressed":   { ico: "✕", label: "Regressed" },
  "in-review":   { ico: "◉", label: "In review" },
  "in-progress": { ico: "◐", label: "In progress" },
  "planned":     { ico: "○", label: "Planned" },
  "stalled":     { ico: "⏸", label: "Stalled" },
  "done":        { ico: "✓", label: "Done" },
};
const SPEC_ORDER = ["regressed","in-review","in-progress","planned","stalled","done"];
const UNIT_ORDER = ["in-review","in-progress","stalled","done"];
const CLAIM_HEADS = {
  "ticket-done-but-open": ["✓", "done but still open"],
  "ticket-stale": ["⏸", "assigned, gone quiet"],
  "unticketed-work": ["?", "work nobody promised"],
  "pr-abandoned": ["✕", "closed without merging"],
};
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sv = st => `var(--${esc(st)})`;
const chip = st => { const d = STATUS[st] || { ico: "·", label: st };
  return `<span class="status" style="color:${sv(st)}">${d.ico} ${esc(d.label)}</span>`; };

function tiles(b) {
  const n = st => (b.specs || []).filter(s => s.status === st).length;
  const active = n("in-progress") + n("in-review");
  const d = b.drift || {};
  const drift = (d.stale_promises?.length||0) + (d.shadow_work?.length||0) +
                (d.scope_creep?.length||0) + (b.claims?.length||0) + (n("regressed"));
  const tile = (num, label, color) =>
    `<div class="tile"><div class="num">${num}</div>
      <div class="lbl"><span class="mark" style="background:${color}"></span>${label}</div></div>`;
  return `<div class="tiles">` +
    tile(n("done"), "specs done", "var(--done)") +
    tile(active, "in flight", "var(--in-progress)") +
    tile(n("planned"), "planned", "var(--planned)") +
    tile(drift, "drift findings", drift ? "var(--stalled)" : "var(--done)") +
    `</div>`;
}

function kanban(b) {
  if (!b.specs?.length)
    return `<section class="panel"><h2>Spec board</h2>
      <div class="empty-col">No specs yet — <code>truthboard spec new "Title"</code></div></section>`;
  const cols = SPEC_ORDER.filter(st => b.specs.some(s => s.status === st));
  return `<div class="board">` + cols.map(st => {
    const d = STATUS[st];
    const cards = b.specs.filter(s => s.status === st).map(s =>
      `<div class="card" style="border-left-color:${sv(st)}">
         <div class="title">${esc(s.title)}</div>
         <div class="sub"><code>${esc(s.id)}</code>${
           s.priority ? `<span class="tag pri">p${esc(s.priority)}</span>` : ""}${
           s.epic ? `<span class="tag">${esc(s.epic)}</span>` : ""}${
           (s.branches||[]).map(x=>`<code>${esc(x)}</code>`).join("")}</div>
         <div class="why">${esc(s.evidence)}</div>
         ${s.owner ? `<div class="owner">${esc(s.owner)}</div>` : ""}
       </div>`).join("");
    return `<div class="col"><h3 style="color:${sv(st)}">${d.ico} ${esc(d.label)}
      <span class="count">${b.specs.filter(s=>s.status===st).length}</span></h3>${cards}</div>`;
  }).join("") + `</div>`;
}

function drift(b) {
  const d = b.drift || {};
  const out = [];
  for (const sc of d.scope_creep || [])
    out.push(`<div class="finding"><span class="ico" style="color:var(--stalled)">⇢</span>
      <span class="what"><b>Scope creep</b> — <code>${esc(sc.spec)}</code> / <code>${esc(sc.branch)}</code>:
      ${Math.round(100*sc.outside_files/sc.total_files)}% of the diff outside spec paths (mostly ${esc(sc.top_dirs)})</span></div>`);
  for (const u of d.stale_promises || [])
    out.push(`<div class="finding"><span class="ico" style="color:var(--stalled)">⏸</span>
      <span class="what"><b>Stale promise</b> — <code>${esc(u.name)}</code>: ${esc(u.evidence)}</span></div>`);
  const sw = d.shadow_work || [];
  sw.slice(0, 6).forEach(c => out.push(
    `<div class="finding"><span class="ico" style="color:var(--muted)">∅</span>
      <span class="what"><b>Shadow work</b> — ${esc(c.subject)} <code>${esc(c.hash)}</code></span></div>`));
  if (sw.length > 6) out.push(`<div class="more">… and ${sw.length - 6} more shadow commits</div>`);
  return `<section class="panel"><h2>Drift — where the board could lie</h2>
    ${out.length ? out.join("") : `<span class="clean">clean — the board matches reality</span>`}</section>`;
}

function claims(b) {
  if (!b.forge) return "";
  const out = [];
  for (const [kind, [ico, head]] of Object.entries(CLAIM_HEADS)) {
    for (const c of (b.claims || []).filter(x => x.kind === kind).slice(0, 8))
      out.push(`<div class="finding"><span class="ico" style="color:var(--stalled)">${ico}</span>
        <span class="what"><b>${esc(c.subject)}</b> ${esc(head)} — ${esc(c.detail)}</span></div>`);
  }
  return `<section class="panel"><h2>Claims vs proof — ${esc(b.forge)}</h2>
    ${out.length ? out.join("") : `<span class="clean">every tracker claim is backed by the repo</span>`}</section>`;
}

function branches(b) {
  if (!b.units?.length) return "";
  const rows = UNIT_ORDER.map(st => b.units.filter(u => u.status === st).map(u =>
    `<div class="r">${chip(u.status)}<code>${esc(u.name)}</code>
     <span class="ev">${esc(u.evidence)}${(u.flags||[]).map(f=>` — ⚠ ${esc(f)}`).join("")}</span></div>`
  ).join("")).join("");
  return `<section class="panel"><h2>Branches</h2><div class="rows">${rows}</div></section>`;
}

function digest(b) {
  const shipped = (b.shipped || []).map(s =>
    `<div class="r"><time>${esc(s.date)}</time>
      <span style="color:var(--done)">✓</span>
      <span><b>${esc(s.title)}</b> <span class="muted"><code>${esc(s.id)}</code>${s.epic ? " · " + esc(s.epic) : ""}</span></span></div>`).join("");
  const rest = (b.digest || []).filter(c => !c.spec).slice(0, 12).map(c =>
    `<div class="r"><time>${esc(c.date)}</time><span class="muted">${esc(c.subject)}</span></div>`).join("");
  const divider = shipped && rest ? `<div class="r"><span class="muted" style="font-size:.72rem">also landed</span></div>` : "";
  return `<section class="panel digest"><h2>Landed in the last ${b.digest_days} days</h2>
    <div class="rows">${(shipped + divider + rest) || `<span class="ev">nothing landed</span>`}</div></section>`;
}

function render(b) {
  const repoLabel = b.forge || (b.repo || "").split("/").filter(Boolean).pop() || b.repo;
  document.getElementById("meta").textContent =
    `${repoLabel} · integration branch ${b.integration_branch} (${b.elected_via})`;
  let html = "";
  if (b.election_note) html += `<div class="warn">⚠ ${esc(b.election_note)}</div>`;
  html += tiles(b) + kanban(b);
  html += `<div class="grid2">` + drift(b) + claims(b) + `</div>`;
  html += `<div class="grid2">` + branches(b) + digest(b) + `</div>`;
  document.getElementById("app").innerHTML = html;
}

let last = "";
async function tick() {
  try {
    const r = await fetch("/api/board");
    if (!r.ok) throw new Error(r.statusText);
    const text = await r.text();
    if (text !== last) { last = text; render(JSON.parse(text)); }
    document.getElementById("updated").textContent = "live · " + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById("updated").textContent = "audit unavailable — retrying";
  }
  setTimeout(tick, 3000);
}
tick();
</script>
</body>
</html>
